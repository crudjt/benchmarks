plugins {
    id 'java'
    id 'application'
}

repositories {
    mavenCentral()

    maven {
        url = "https://central.sonatype.com/repository/maven-snapshots/"
    }
}

dependencies {
  implementation 'com.crudjt:crudjt-java:1.0.0-SNAPSHOT'
  implementation 'org.msgpack:msgpack-core:0.9.0'
}

application {
    mainClass = 'TestCRUDJT'
}
