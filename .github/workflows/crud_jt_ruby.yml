name: crud_jt-ruby benchmarks

on:
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            arch: aarch64
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.4
          bundler-cache: true

      - name: Install Bundler
        run: |
          gem install bundler

      - name: Checkout crud_jt-ruby
        uses: actions/checkout@v4
        with:
          repository: exwarvlad/crud_jt-ruby
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: crud_jt-ruby

      - name: Install crud_jt-ruby
        run: |
          cd crud_jt-ruby
          bundle install
          bundle exec rake build
          gem install pkg/crud_jt-0.1.0.gem

      - name: Run benchmark
        run: ruby crud_jt_tests/crud_jt_performance_test.rb
