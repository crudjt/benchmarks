name: crud_jt-python benchmarks

on:
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: aarch64
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.7'

      - name: Checkout crud_jt-python
        uses: actions/checkout@v4
        with:
          repository: exwarvlad/crud_jt-python
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: crud_jt-python

      - name: Install crud_jt-python
        run: |
          cd crud_jt-python
          python -m pip install --upgrade pip
          pip3 install .

      - name: Run autotest
        run: |
          python3 crud_jt_tests/crud_jt_performance_test.py
