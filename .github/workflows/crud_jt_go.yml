name: crud_jt-go benchmarks

on:
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: aarch64
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Checkout crud_jt-go
        uses: actions/checkout@v4
        with:
          repository: exwarvlad/crud_jt-go
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: crud_jt-go

      - name: Run Go program
        working-directory: ./crud_jt_tests/crud_jt_performance_go
        run: |
          go build
          go run .
