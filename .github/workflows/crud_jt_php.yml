name: crudjt-php benchmarks

on:
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: aarch64
          - os: ubuntu-latest
            arch: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, json, ffi, msgpack
          tools: composer

      - name: Run benchmarks
        run: |
          composer require crudjt/crudjt-php:^1.0@beta
          php crud_jt_tests/crud_jt_performance_test.php
