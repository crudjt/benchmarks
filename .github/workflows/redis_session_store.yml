name: redis-session-storage benchmarks

on:
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            arch: aarch64
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: ./redis_bench

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.4
          bundler-cache: true

      - name: Install and start Redis on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-server
          redis-server --daemonize yes

      - name: Install and start Redis on macOS
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install redis
          brew services start redis

      - name: Install gems
        run: bundle install

      - name: Run benchmark
        run: bundle exec rails runner lib/redis_session_store_performance_test.rb
